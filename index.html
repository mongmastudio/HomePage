    <style>
        :root {
            --bg-color: #0b0c10;
            --primary-color: #66fcf1;
            --secondary-color: #45a29e;
            --text-color: #c5c6c7;
            --glass-bg: rgba(11, 12, 16, 0.6);
            --glass-border: rgba(102, 252, 241, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', 'Noto Sans KR', sans-serif;
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg-color);
            color: #ffffff;
            overflow-x: hidden;
            overscroll-behavior: none;
        }

        /* Video Background */
        .video-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            z-index: -2;
            opacity: 0.5;
            /* Dark overlay effect */
        }

        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(to bottom, rgba(11, 12, 16, 0.2) 0%, rgba(11, 12, 16, 0.9) 100%);
            z-index: -1;
        }

        /* App Container */
        #root {
            width: 100%;
            height: 100vh;
        }

        /* Hero Section */
        .hero {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: none;
            /* Let clicks pass through to 3D canvas if needed */
        }

        .hero-content {
            z-index: 10;
            text-align: center;
            pointer-events: auto;
        }

        .hero-logo {
            width: 450px;
            margin-bottom: 30px;
            filter: drop-shadow(0 0 30px rgba(102, 252, 241, 0.4));
        }

        .hero-title {
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #ffffff, var(--primary-color));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .hero-subtitle {
            font-size: 1.2rem;
            color: var(--text-color);
            margin-bottom: 50px;
            font-weight: 300;
        }

        /* 3D Canvas Layer */
        .canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            pointer-events: none;
            /* So buttons can be clicked */
        }

        /* Buttons */
        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
            pointer-events: auto;
        }

        .btn {
            padding: 15px 40px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-home {
            background: rgba(102, 252, 241, 0.1);
            color: var(--primary-color);
        }

        .btn-home:hover {
            background: rgba(102, 252, 241, 0.2);
            box-shadow: 0 0 20px rgba(102, 252, 241, 0.4);
            transform: translateY(-3px);
        }

        .btn-contact {
            background: var(--primary-color);
            color: var(--bg-color);
            border: 1px solid var(--primary-color);
        }

        .btn-contact:hover {
            background: #4aebe0;
            box-shadow: 0 0 20px rgba(102, 252, 241, 0.6);
            transform: translateY(-3px);
        }

        /* About Section */
        .about-section {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 100px 20px;
            background: var(--bg-color);
            position: relative;
            z-index: 10;
            overflow: hidden;
        }

        .about-video-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
            opacity: 0.5;
        }

        .about-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(11, 12, 16, 0.5) 0%, rgba(11, 12, 16, 0.9) 100%);
            z-index: 0;
        }

        .about-content {
            max-width: 800px;
            text-align: center;
            position: relative;
            z-index: 5;
        }

        .about-box {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            padding: 50px;
            border-radius: 20px;
            backdrop-filter: blur(15px);
            margin-top: 40px;
        }

        .about-box h2 {
            font-size: 2.5rem;
            color: var(--primary-color);
            margin-bottom: 20px;
        }

        .about-box p {
            font-size: 1.1rem;
            line-height: 1.8;
            color: var(--text-color);
        }

        /* Contact Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal-content {
            background: linear-gradient(145deg, #12141a, #0b0c10);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 40px;
            width: 90%;
            max-width: 500px;
            position: relative;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), 0 0 30px rgba(102, 252, 241, 0.1);
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: transparent;
            border: none;
            color: var(--text-color);
            font-size: 1.5rem;
            cursor: pointer;
            transition: color 0.3s;
        }

        .close-btn:hover {
            color: var(--primary-color);
        }

        .modal-content h3 {
            font-size: 2rem;
            color: #fff;
            margin-bottom: 10px;
        }

        .contact-number {
            font-size: 1.5rem;
            color: var(--primary-color);
            font-weight: 700;
            margin: 20px 0;
            display: inline-block;
            background: rgba(102, 252, 241, 0.1);
            padding: 10px 20px;
            border-radius: 10px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-color);
            font-size: 0.9rem;
        }

        .form-control {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #fff;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary-color);
            background: rgba(255, 255, 255, 0.08);
        }

        textarea.form-control {
            resize: vertical;
            min-height: 100px;
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background: var(--primary-color);
            color: var(--bg-color);
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .submit-btn:hover {
            background: #4aebe0;
            box-shadow: 0 0 15px rgba(102, 252, 241, 0.5);
        }

        @media (max-width: 768px) {
            .hero-title {
                font-size: 2.5rem;
            }

            .hero-subtitle {
                font-size: 1rem;
            }

            .action-buttons {
                flex-direction: column;
                gap: 15px;
            }

            .btn {
                width: 100%;
            }
        }
    </style>
</head>
